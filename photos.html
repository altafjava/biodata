<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- user-scalable=no disables browser pinch-zoom so our JS zoom works cleanly -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
    <title>Photos — Altaf Ansari</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="analytics/config.js"></script>
    <script src="analytics/biodata.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
        font-family: "Poppins", "Segoe UI", sans-serif;
        touch-action: none; /* JS handles all touch */
      }

      /* ── Viewer shell ─────────────────────────────────────── */
      #viewer {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* ── Slide track ─────────────────────────────────────── */
      #slide-track {
        display: flex;
        width: 100%;
        height: 100%;
        will-change: transform;
      }

      #slide-track.snapping {
        transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* ── Individual slide ────────────────────────────────── */
      .slide {
        width: 100vw;
        height: 100vh;
        flex-shrink: 0;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* Blurred background fill */
      .slide-bg {
        position: absolute;
        inset: -30px;
        background-size: cover;
        background-position: center;
        filter: blur(24px) brightness(0.28) saturate(0.7);
        transform: scale(1.15);
        z-index: 0;
        pointer-events: none;
      }

      /* Photo wrap — handles zoom/pan touch */
      .slide-wrap {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        touch-action: none;
        user-select: none;
      }

      .slide-img {
        max-width: 100%;
        max-height: 100vh;
        object-fit: contain;
        display: block;
        pointer-events: none;
        user-select: none;
        -webkit-user-drag: none;
        will-change: transform;
        transform-origin: center center;
      }

      .slide-img.no-anim {
        transition: none !important;
      }

      /* ── UI overlays ──────────────────────────────────────── */

      /* Back button — top-left */
      #back-btn {
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 1000;
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        border: none;
        border-radius: 22px;
        padding: 8px 14px 8px 10px;
        font-family: "Poppins", sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
        text-decoration: none;
      }
      #back-btn:hover {
        background: rgba(0, 0, 0, 0.75);
      }
      #back-btn:active {
        background: rgba(0, 0, 0, 0.9);
      }

      /* Counter — top-right */
      #counter {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.55);
        color: rgba(255, 255, 255, 0.92);
        font-size: 12px;
        font-weight: 600;
        padding: 5px 13px;
        border-radius: 20px;
        white-space: nowrap;
        letter-spacing: 0.04em;
        pointer-events: none;
      }

      /* Zoom hint — bottom-right, fades after first zoom */
      #zoom-hint {
        position: fixed;
        bottom: 70px;
        right: 16px;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.5);
        color: rgba(255, 255, 255, 0.75);
        font-size: 10px;
        font-weight: 500;
        padding: 5px 11px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 5px;
        pointer-events: none;
        transition: opacity 0.5s;
      }
      #zoom-hint.hidden {
        opacity: 0;
      }

      /* Dot navigation — bottom-center */
      #dots {
        position: fixed;
        bottom: 22px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        display: flex;
        align-items: center;
        gap: 7px;
        background: rgba(0, 0, 0, 0.55);
        padding: 7px 14px;
        border-radius: 30px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.4);
        border: none;
        padding: 0;
        cursor: pointer;
        transition:
          width 0.3s,
          background 0.3s;
        flex-shrink: 0;
      }
      .dot.active {
        width: 22px;
        background: #fff;
      }

      /* Edge arrows */
      .nav-arrow {
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        z-index: 1000;
        background: rgba(0, 0, 0, 0.38);
        border: none;
        color: #fff;
        width: 44px;
        height: 80px;
        font-size: 1.8rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        line-height: 1;
        transition:
          background 0.2s,
          opacity 0.2s;
      }
      #arrow-left {
        left: 0;
        border-radius: 0 40px 40px 0;
      }
      #arrow-right {
        right: 0;
        border-radius: 40px 0 0 40px;
      }
      .nav-arrow:hover {
        background: rgba(0, 0, 0, 0.58);
      }
      .nav-arrow:active {
        background: rgba(0, 0, 0, 0.78);
      }
      .nav-arrow.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* Loading state */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 14px;
        color: rgba(255, 255, 255, 0.5);
        font-size: 13px;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: rgba(255, 255, 255, 0.7);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Error state */
      #error {
        display: none;
        position: fixed;
        inset: 0;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 14px;
        color: rgba(255, 255, 255, 0.6);
        font-size: 14px;
        text-align: center;
        padding: 40px;
      }
      #error a {
        color: #7c9fff;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <!-- Loading screen -->
    <div id="loading">
      <div class="spinner"></div>
      <span>Loading photos…</span>
    </div>

    <!-- Error screen -->
    <div id="error">
      <div style="font-size: 2.5rem">📷</div>
      <div>No photos found.</div>
      <a href="index.html">← Back to Biodata</a>
    </div>

    <!-- Back button -->
    <a id="back-btn" href="index.html" style="display: none">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6" />
      </svg>
      Biodata
    </a>

    <!-- Photo counter -->
    <div id="counter" style="display: none">1 / 1</div>

    <!-- Zoom hint -->
    <div id="zoom-hint" style="display: none">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
        <line x1="11" y1="8" x2="11" y2="14" />
        <line x1="8" y1="11" x2="14" y2="11" />
      </svg>
      Pinch or double-tap to zoom
    </div>

    <!-- Dot navigation -->
    <div id="dots" style="display: none"></div>

    <!-- Edge nav arrows -->
    <button class="nav-arrow hidden" id="arrow-left" aria-label="Previous photo">&#8249;</button>
    <button class="nav-arrow hidden" id="arrow-right" aria-label="Next photo">&#8250;</button>

    <!-- Slide viewer -->
    <div id="viewer" style="display: none">
      <div id="slide-track"></div>
    </div>

    <script>
      (function () {
        "use strict";

        var photos = [];
        var current = 0;
        var zoomStates = []; // {scale, panX, panY} per slide
        var hintHidden = false;
        var pageViewStart = {};

        // DOM refs
        var track = document.getElementById("slide-track");
        var dotsEl = document.getElementById("dots");
        var counterEl = document.getElementById("counter");
        var zoomHint = document.getElementById("zoom-hint");
        var arrowL = document.getElementById("arrow-left");
        var arrowR = document.getElementById("arrow-right");
        var backBtn = document.getElementById("back-btn");
        var loadingEl = document.getElementById("loading");
        var errorEl = document.getElementById("error");
        var viewerEl = document.getElementById("viewer");

        // ── Manifest ─────────────────────────────────────────────
        function loadManifest(cb) {
          fetch("photos/manifest.json?_=" + Date.now())
            .then(function (r) {
              if (!r.ok) throw 0;
              return r.json();
            })
            .then(function (d) {
              cb(Array.isArray(d) && d.length ? d : []);
            })
            .catch(function () {
              cb([]);
            });
        }

        // ── Build slides ──────────────────────────────────────────
        function buildSlides() {
          photos.forEach(function (filename, i) {
            var src = "photos/" + filename;
            var slide = document.createElement("div");
            slide.className = "slide";
            slide.id = "slide-" + i;
            slide.innerHTML =
              '<div class="slide-bg" style="background-image:url(\'' +
              src +
              "')\"></div>" +
              '<div class="slide-wrap" id="wrap-' +
              i +
              '">' +
              '<img class="slide-img" id="img-' +
              i +
              '" src="' +
              src +
              '" alt="Photo ' +
              (i + 1) +
              '" loading="' +
              (i === 0 ? "eager" : "lazy") +
              '">' +
              "</div>";
            track.appendChild(slide);
            zoomStates[i] = { scale: 1, panX: 0, panY: 0 };
            setupZoom(i);
          });
        }

        // ── Dots ──────────────────────────────────────────────────
        function buildDots() {
          if (photos.length <= 1) {
            dotsEl.style.display = "none";
            return;
          }
          photos.forEach(function (_, i) {
            var d = document.createElement("button");
            d.className = "dot" + (i === 0 ? " active" : "");
            d.setAttribute("aria-label", "Photo " + (i + 1));
            d.addEventListener("click", function () {
              goTo(i);
            });
            dotsEl.appendChild(d);
          });
          dotsEl.style.display = "flex";
        }

        function updateDots() {
          dotsEl.querySelectorAll(".dot").forEach(function (d, i) {
            d.classList.toggle("active", i === current);
          });
        }

        function updateArrows() {
          arrowL.classList.toggle("hidden", current === 0);
          arrowR.classList.toggle("hidden", current >= photos.length - 1);
        }

        function updateCounter() {
          counterEl.textContent = current + 1 + " / " + photos.length;
        }

        // ── Navigate ──────────────────────────────────────────────
        function goTo(n, instant) {
          if (n < 0 || n >= photos.length) return;

          // analytics: view_end
          if (pageViewStart[current] !== undefined) {
            trackEvent({
              photo_name: photos[current],
              photo_index: current,
              event_type: "view_end",
              duration_seconds: Math.round((Date.now() - pageViewStart[current]) / 1000),
            });
            delete pageViewStart[current];
          }

          // reset zoom on slide we're leaving
          resetZoom(current, false);

          current = n;

          if (instant) track.classList.remove("snapping");
          else track.classList.add("snapping");

          track.style.transform = "translateX(-" + n * 100 + "vw)";
          updateDots();
          updateArrows();
          updateCounter();

          // analytics: view
          pageViewStart[current] = Date.now();
          trackEvent({ photo_name: photos[current], photo_index: current, event_type: "view" });
        }

        // ── Zoom helpers ──────────────────────────────────────────
        function applyZoom(i, animated) {
          var img = document.getElementById("img-" + i);
          if (!img) return;
          var z = zoomStates[i];
          if (animated) img.classList.remove("no-anim");
          else img.classList.add("no-anim");
          img.style.transform = "scale(" + z.scale + ") translate(" + z.panX / z.scale + "px," + z.panY / z.scale + "px)";
        }

        function resetZoom(i, animated) {
          zoomStates[i] = { scale: 1, panX: 0, panY: 0 };
          applyZoom(i, animated !== false);
        }

        function isZoomed(i) {
          return zoomStates[i] && zoomStates[i].scale > 1.05;
        }

        function hideZoomHint() {
          if (hintHidden) return;
          hintHidden = true;
          zoomHint.classList.add("hidden");
        }

        // ── Per-slide zoom + pan ──────────────────────────────────
        function setupZoom(index) {
          var wrap = document.getElementById("wrap-" + index);
          if (!wrap) return;

          var lastTap = 0;
          var pinching = false;
          var pinchDist0 = 0,
            pinchScale0 = 1;
          var panning = false;
          var tStartX = 0,
            tStartY = 0,
            panX0 = 0,
            panY0 = 0;

          function dist2(touches) {
            var dx = touches[0].clientX - touches[1].clientX;
            var dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
          }

          wrap.addEventListener(
            "touchstart",
            function (e) {
              var z = zoomStates[index];
              if (e.touches.length === 2) {
                pinching = true;
                panning = false;
                pinchDist0 = dist2(e.touches);
                pinchScale0 = z.scale;
                e.preventDefault();
              } else if (e.touches.length === 1) {
                var now = Date.now();
                if (now - lastTap < 280) {
                  // Double-tap
                  if (isZoomed(index)) {
                    resetZoom(index, true);
                  } else {
                    zoomStates[index] = { scale: 2.5, panX: 0, panY: 0 };
                    applyZoom(index, true);
                    hideZoomHint();
                    trackEvent({ photo_name: photos[index], photo_index: index, event_type: "zoom" });
                  }
                  lastTap = 0;
                  e.preventDefault();
                  return;
                }
                lastTap = now;
                tStartX = e.touches[0].clientX;
                tStartY = e.touches[0].clientY;
                panX0 = z.panX;
                panY0 = z.panY;
                panning = isZoomed(index);
              }
            },
            { passive: false },
          );

          wrap.addEventListener(
            "touchmove",
            function (e) {
              var z = zoomStates[index];
              if (e.touches.length === 2 && pinching) {
                e.preventDefault();
                var d = dist2(e.touches);
                z.scale = Math.min(4, Math.max(1, (pinchScale0 * d) / pinchDist0));
                if (z.scale <= 1) {
                  z.panX = 0;
                  z.panY = 0;
                }
                zoomStates[index] = z;
                applyZoom(index, false);
                if (z.scale > 1.1) {
                  hideZoomHint();
                  trackEvent({ photo_name: photos[index], photo_index: index, event_type: "zoom" });
                }
              } else if (e.touches.length === 1 && panning) {
                e.preventDefault();
                z.panX = panX0 + (e.touches[0].clientX - tStartX);
                z.panY = panY0 + (e.touches[0].clientY - tStartY);
                zoomStates[index] = z;
                applyZoom(index, false);
              }
              // if not panning and not pinching → swipe handler takes it
            },
            { passive: false },
          );

          wrap.addEventListener(
            "touchend",
            function () {
              if (zoomStates[index].scale < 1.05) resetZoom(index, true);
              pinching = false;
              panning = false;
            },
            { passive: true },
          );

          // Desktop: scroll-wheel zoom
          wrap.addEventListener(
            "wheel",
            function (e) {
              e.preventDefault();
              var z = zoomStates[index];
              z.scale = Math.min(4, Math.max(1, z.scale + (e.deltaY > 0 ? -0.25 : 0.25)));
              if (z.scale <= 1) {
                z.panX = 0;
                z.panY = 0;
              }
              zoomStates[index] = z;
              applyZoom(index, false);
              if (z.scale > 1.1) hideZoomHint();
            },
            { passive: false },
          );

          // Save attempt tracking
          wrap.addEventListener("contextmenu", function () {
            trackEvent({ photo_name: photos[index], photo_index: index, event_type: "download_attempt" });
          });
        }

        // ── Swipe between photos ──────────────────────────────────
        // No biodata content on this page so no scroll conflict at all.
        function setupSwipe() {
          var startX = 0,
            startY = 0,
            curX = 0;
          var active = false,
            dirLocked = null,
            basePct = 0;

          function onStart(e) {
            if (e.touches && e.touches.length > 1) return;
            // Skip if zoomed — zoom handler manages touch
            if (isZoomed(current)) return;

            active = true;
            dirLocked = null;
            startX = e.touches ? e.touches[0].clientX : e.clientX;
            startY = e.touches ? e.touches[0].clientY : e.clientY;
            curX = startX;
            basePct = current * 100;
            track.classList.remove("snapping");
          }

          function onMove(e) {
            if (!active) return;
            if (e.touches && e.touches.length > 1) {
              cancel();
              return;
            }

            var x = e.touches ? e.touches[0].clientX : e.clientX;
            var y = e.touches ? e.touches[0].clientY : e.clientY;
            var dx = x - startX;
            var dy = y - startY;
            curX = x;

            if (!dirLocked && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
              dirLocked = Math.abs(dx) > Math.abs(dy) ? "h" : "v";
            }

            if (dirLocked === "h") {
              if (e.cancelable) e.preventDefault();
              var rawDx = dx;
              if ((current === 0 && rawDx > 0) || (current >= photos.length - 1 && rawDx < 0)) {
                rawDx *= 0.2; // rubber-band at ends
              }
              track.style.transform = "translateX(-" + (basePct - (rawDx / window.innerWidth) * 100) + "vw)";
            }
          }

          function onEnd() {
            if (!active) return;
            active = false;
            var dx = curX - startX;
            track.classList.add("snapping");
            if (dirLocked === "h" && Math.abs(dx) > 45) {
              if (dx < 0 && current < photos.length - 1) goTo(current + 1);
              else if (dx > 0 && current > 0) goTo(current - 1);
              else snap();
            } else {
              snap();
            }
          }

          function cancel() {
            active = false;
            snap();
          }
          function snap() {
            track.classList.add("snapping");
            track.style.transform = "translateX(-" + current * 100 + "vw)";
          }

          // Touch (all browsers)
          document.addEventListener("touchstart", onStart, { passive: true });
          document.addEventListener("touchmove", onMove, { passive: false });
          document.addEventListener("touchend", onEnd, { passive: true });
          document.addEventListener("touchcancel", cancel, { passive: true });

          // Desktop keyboard
          document.addEventListener("keydown", function (e) {
            if (e.key === "ArrowRight") goTo(current + 1);
            if (e.key === "ArrowLeft") goTo(current - 1);
            if (e.key === "Backspace" || e.key === "Escape") history.back();
          });
        }

        // ── Analytics bridge ──────────────────────────────────────
        function trackEvent(data) {
          if (window._galleryAnalytics && typeof window._galleryAnalytics.trackEvent === "function") {
            window._galleryAnalytics.trackEvent(data);
          }
        }

        // ── Init ──────────────────────────────────────────────────
        loadManifest(function (files) {
          loadingEl.style.display = "none";

          if (!files.length) {
            errorEl.style.display = "flex";
            return;
          }

          photos = files;

          // Open to specific photo if sessionStorage says so
          var savedIndex = parseInt(sessionStorage.getItem("_gl_photo") || "0");
          if (isNaN(savedIndex) || savedIndex >= photos.length) savedIndex = 0;
          current = savedIndex;

          buildSlides();
          buildDots();

          // Position track instantly to saved photo
          track.style.transform = "translateX(-" + current * 100 + "vw)";
          track.classList.remove("snapping");

          // Show UI
          viewerEl.style.display = "flex";
          backBtn.style.display = "";
          counterEl.style.display = "";
          zoomHint.style.display = "";
          updateCounter();
          updateArrows();
          updateDots();

          setupSwipe();

          // Arrow button clicks
          arrowL.addEventListener("click", function () {
            goTo(current - 1);
          });
          arrowR.addEventListener("click", function () {
            goTo(current + 1);
          });

          // Dot clicks — already wired in buildDots

          // Track initial view
          pageViewStart[current] = Date.now();
          trackEvent({ photo_name: photos[current], photo_index: current, event_type: "view" });

          // Save last-viewed photo on unload
          window.addEventListener("beforeunload", function () {
            sessionStorage.setItem("_gl_photo", current);
            if (pageViewStart[current] !== undefined) {
              trackEvent({
                photo_name: photos[current],
                photo_index: current,
                event_type: "view_end",
                duration_seconds: Math.round((Date.now() - pageViewStart[current]) / 1000),
              });
            }
          });
        });
      })();
    </script>
  </body>
</html>
